version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      ENV: ${ENV:-production}
      DATABASE_URL: ${DATABASE_URL:-postgresql://infrarisk_user:change-me@db:5432/infrarisk}
      INFRARISK_DATA_PATH: ${INFRARISK_DATA_PATH:-/app/data/raw}
      UVICORN_HOST: 0.0.0.0
      PORT: 8000
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - '8000:8000'
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./data:/app/data:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  db:
    image: postgres:15-alpine
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-infrarisk}
      POSTGRES_USER: ${POSTGRES_USER:-infrarisk_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-infrarisk_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    env_file:
      - .env
    command: >
      mlflow server
      --backend-store-uri sqlite:///mlflow.db
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0
      --port 5000
    ports:
      - '5000:5000'
    volumes:
      - mlflow_data:/mlflow
      - mlflow_artifacts:/mlflow/artifacts

volumes:
  postgres_data:
  mlflow_data:
  mlflow_artifacts:
