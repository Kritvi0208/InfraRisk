version: '3.8'

services:
  # PostgreSQL database for analytical data storage
  postgres:
    image: postgres:15-alpine
    container_name: infrarisk_postgres
    environment:
      POSTGRES_DB: infrarisk_db
      POSTGRES_USER: infrarisk_admin
      POSTGRES_PASSWORD: infrarisk_prod_2024
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - infrarisk_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U infrarisk_admin"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis cache for features and real-time data
  redis:
    image: redis:7-alpine
    container_name: infrarisk_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - infrarisk_net
    command: redis-server --appendonly yes --requirepass infrarisk_redis_pwd
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Backend API service (FastAPI)
  backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
    container_name: infrarisk_backend
    environment:
      - POSTGRES_USER=infrarisk_admin
      - POSTGRES_PASSWORD=infrarisk_prod_2024
      - POSTGRES_DB=infrarisk_db
      - POSTGRES_HOST=postgres
      version: '3.8'

      services:
        api:
          build:
            context: .
            dockerfile: Dockerfile
          command: uvicorn api_server:app --host 0.0.0.0 --port 8000
          ports:
            - "8000:8000"
          volumes:
            - ./data:/app/data
            - ./models:/app/models
          restart: unless-stopped

        streamlit:
          build:
            context: .
            dockerfile: Dockerfile
          command: streamlit run p5_streamlit_app.py --server.address=0.0.0.0 --server.port=8501
          ports:
            - "8501:8501"
          volumes:
            - ./data:/app/data
            - ./models:/app/models
          depends_on:
            - api
          restart: unless-stopped
  streamlit:
