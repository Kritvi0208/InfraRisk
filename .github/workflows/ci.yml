name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          pip install black isort flake8 mkdocs
      - name: Check formatting
        run: |
          ZERO_SHA="0000000000000000000000000000000000000000"

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            if git fetch --no-tags origin "${{ github.event.pull_request.base.sha }}"; then
              PR_BASE="${{ github.event.pull_request.base.sha }}"
            else
              git fetch --no-tags origin "+${{ github.event.pull_request.base.ref }}:refs/remotes/origin/${{ github.event.pull_request.base.ref }}"
              PR_BASE="origin/${{ github.event.pull_request.base.ref }}"
            fi
            DIFF_RANGE="${PR_BASE}...HEAD"
          elif [[ "${{ github.event.before }}" != "${ZERO_SHA}" ]]; then
            DIFF_RANGE="${{ github.event.before }}...${{ github.event.after }}"
          else
            INITIAL_COMMIT=1
          fi

          if [ "${INITIAL_COMMIT:-0}" -eq 1 ]; then
            mapfile -t PY_FILES < <(git diff-tree --no-commit-id --name-only --diff-filter=ACMR -r HEAD -- '*.py')
          else
            mapfile -t PY_FILES < <(git diff --name-only --diff-filter=ACMR "${DIFF_RANGE}" -- '*.py')
          fi

          if [ "${#PY_FILES[@]}" -eq 0 ]; then
            echo "No changed Python files to lint."
            exit 0
          fi

          black --check "${PY_FILES[@]}"
          isort --check-only "${PY_FILES[@]}"
          flake8 "${PY_FILES[@]}" --count --select=E9,F63,F7,F82 --show-source --statistics
      - name: Build docs
        run: |
          mkdocs build --strict

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install test tools
        run: |
          python -m pip install --upgrade pip
          pip install -r deliverables/requirements-app.txt pytest pytest-cov
      - name: Run smoke tests
        run: |
          pytest -q src/core/test_final_engine.py tests/test_phase4_integration.py