name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          pip install black isort flake8 mkdocs
      - name: Check formatting
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git fetch --no-tags --depth=1 origin "${{ github.event.pull_request.base.ref }}:refs/remotes/origin/${{ github.event.pull_request.base.ref }}"
            DIFF_RANGE="origin/${{ github.event.pull_request.base.ref }}...HEAD"
          elif git rev-parse HEAD^ >/dev/null 2>&1; then
            DIFF_RANGE="HEAD^...HEAD"
          else
            DIFF_RANGE="HEAD"
          fi

          mapfile -t PY_FILES < <(git diff --name-only --diff-filter=ACMR "${DIFF_RANGE}" -- '*.py')

          if [ "${#PY_FILES[@]}" -eq 0 ]; then
            echo "No changed Python files to lint."
            exit 0
          fi

          black --check "${PY_FILES[@]}"
          isort --check-only "${PY_FILES[@]}"
          flake8 "${PY_FILES[@]}" --count --select=E9,F63,F7,F82 --show-source --statistics
      - name: Build docs
        run: |
          mkdocs build --strict

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install test tools
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-app.txt pytest pytest-cov
      - name: Run smoke tests
        run: |
          pytest -q test_final_engine.py test_phase4_integration.py