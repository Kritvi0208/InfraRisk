data:
  cache_dir: ./data/cache
  sources:
    - wbppi
    - rates
    - macro
    - nbi
    - satellite
    - commodities

features:
  feast_store: ./feast_registry
  version: v1.0

models:
  cnn:
    backbone: resnet50
    input_size: 256
  tft:
    hidden_size: 256
    num_heads: 8
  pinn:
    physics_loss_weight: 0.5

simulation:
  quarters: 20
  scenarios: 10000

deploy:
  docker_image: infrarisk:v1.0
  port: 8000
